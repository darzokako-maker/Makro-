name: Modern-Makro-Build

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gereklilikleri Yukle
        run: |
          pip install pyinstaller customtkinter mouse keyboard

      - name: Exe Yap (Modern Menu)
        # --collect-all: CustomTkinter'ın tema dosyalarını içine gömer
        run: pyinstaller --onefile --noconsole --collect-all customtkinter main.py

      - name: Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Modern-Makro-Programi
          path: dist/*.exe
          
