name: Gemini-Pro-Macro-Build

on:
  push:
    branches: [ "main" ] # Kodunu ana dizine yüklediğinde çalışır
  workflow_dispatch: # Manuel olarak da başlatmanı sağlar

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Pip Önbelleğini Ayarla (Hızlı Derleme İçin)
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter pynput pydirectinput

      - name: Tek Dosya Exe Oluştur
        # --collect-all customtkinter: Menü temalarının exe içinde çalışması için şarttır
        # --noconsole: Açıldığında arkada siyah CMD penceresi göstermez
        run: |
          pyinstaller --onefile --noconsole --collect-all customtkinter main.py

      - name: Exe Dosyasını Teslim Et
        uses: actions/upload-artifact@v4
        with:
          name: Gaming-Macro-Build
          path: dist/*.exe
          
