name: Python Exe Yap

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Kütüphaneleri Yükle
        run: pip install pyinstaller pyautogui keyboard
      - name: Exe Yap
        run: pyinstaller --onefile main.py
      - name: Yukle
        uses: actions/upload-artifact@v4
        with:
          name: PythonMakro
          path: dist/*.exe
          
